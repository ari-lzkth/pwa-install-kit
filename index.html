<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meine APP</title>

  <!-- PWA: Manifest + Theme -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d6efd" />

  <!-- iOS / Safari spezifisch -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meine APP" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f5f6f8;
      color: #1a1a1a;
      min-height: 100dvh;
    }
    header {
      background: #0d6efd;
      color: #fff;
      padding: 1.25rem 1rem;
      text-align: center;
      padding-top: max(1.25rem, env(safe-area-inset-top));
    }
    main { padding: 1.5rem 1rem; max-width: 640px; margin: 0 auto; }
  </style>
</head>
<body>
  <header>
    <h1>Meine APP</h1>
    <p>Willkommen in der App</p>
  </header>

  <main>
    <p>Dies ist die eigentliche Anwendung. Sie wird angezeigt, sobald die App
       installiert ist und über das Startbildschirm-Icon geöffnet wird.</p>
    <!-- Hier kommt dein App-Inhalt hin -->

    <!-- Wartungs-Button: Cache/Storage leeren & frisch laden (bei Bedarf entfernen) -->
    <div style="margin-top:3rem;text-align:center">
      <button id="resetBtn" type="button"
        style="padding:.7rem 1.1rem;font-size:.9rem;color:#0d6efd;background:#fff;
               border:1px solid #cdd9f7;border-radius:10px;cursor:pointer">
        🗑️ Cache leeren &amp; neu laden
      </button>
      <p id="resetMsg" style="font-size:.75rem;color:#888;margin:.6rem 0 0"></p>
    </div>
  </main>

  <script>
    /* Service Worker registrieren (für Offline-Betrieb der installierten App) */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      });
    }

    /* Hard-Reset: Service Worker abmelden, alle Caches + Storage leeren, frisch laden */
    document.getElementById('resetBtn').addEventListener('click', async () => {
      const msg = document.getElementById('resetMsg');
      msg.textContent = 'Wird geleert …';
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        try { localStorage.clear(); } catch (_) {}
        try { sessionStorage.clear(); } catch (_) {}
      } catch (e) {
        msg.textContent = 'Hinweis: ' + e.message;
      }
      /* Mit Cache-Busting neu laden, damit auch der HTTP-Cache umgangen wird */
      const base = location.href.split('#')[0].split('?')[0];
      location.replace(base + '?frisch=' + Date.now());
    });
  </script>
</body>
</html>
